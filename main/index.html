<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // 註冊一個專門掛在 target 上的播放組件
      AFRAME.registerComponent("mytarget", {
        init: function () {
          var el = this.el; // 當前的 a-entity 目標

          // 自動尋找這個目標裡面的 a-video，並取得它綁定的影片 ID
          var videoEntity = el.querySelector("a-video");
          if (!videoEntity) return;

          var videoSelector = videoEntity.getAttribute("src");
          var videoElement = document.querySelector(videoSelector);

          if (videoElement) {
            // 當前這張圖被掃描到時
            el.addEventListener("targetFound", () => {
              console.log("找到目標: " + videoSelector + "，開始播放");
              videoElement
                .play()
                .catch((err) => console.log("自動播放受阻:", err));
            });

            // // 當前這張圖離開視線時
            // el.addEventListener("targetLost", () => {
            //   console.log("失去目標: " + videoSelector + "，暫停播放");
            //   videoElement.pause();
            // });
          }
        },
      });
    </script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./assets/rivers.mind"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="video0"
          src="./assets/zhuoshui_river_ar_motion.webm"
          preload="auto"
          loop="true"
          muted
          crossorigin="anonymous"
          webkit-playsinline
          playsinline
        ></video>
        <video
          id="video1"
          src="./assets/zengwen_river_ar_motion.webm"
          preload="auto"
          loop="true"
          muted
          crossorigin="anonymous"
          webkit-playsinline
          playsinline
        ></video>
        <video
          id="video2"
          src="./assets/xiuguluan_river_ar_motion.webm"
          preload="auto"
          loop="true"
          muted
          crossorigin="anonymous"
          webkit-playsinline
          playsinline
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" mytarget>
        <a-video
          src="#video0"
          position="0 0 0"
          height="2.5"
          width="1.38"
          rotation="0 0 0"
        ></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" mytarget>
        <a-video
          src="#video1"
          position="0 0 0"
          height="2.5"
          width="1.38"
          rotation="0 0 0"
        ></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" mytarget>
        <a-video
          src="#video2"
          position="0 0 0"
          height="2.5"
          width="1.38"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>
  </body>
</html>
