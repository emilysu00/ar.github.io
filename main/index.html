<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      a-scene {
        width: 100vw;
        height: 100vh;
      }

      /*
        iOS / MOV 專用 overlay。
        Android / Chrome 使用 WebM 時，AR 影片仍然走原本的 a-video。
      */
      #centerVideoOverlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        justify-content: center;
        align-items: center;
        background: transparent !important;
        pointer-events: none;
      }

      #centerVideoOverlay.is-active {
        display: flex;
      }

      #centerVideoOverlay video {
        width: min(72vw, 420px);
        aspect-ratio: 9 / 16;
        height: auto;
        object-fit: contain;
        background: transparent !important;
        pointer-events: none;
      }

      body.is-video-playing .mindar-ui-scanning {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>

    <script>
      /*
        影片來源設定：
        - Android / Chrome：使用 webm，保留原本 AR a-video。
        - iOS / Safari：強制使用 mov + HTML overlay，避開 iOS WebGL texture 吃掉 alpha 的問題。
      */
      const TRANSPARENT_VIDEO_SOURCES = {
        video0: {
          webm: "./assets/zhuoshui_river_ar_motion.webm",
          mov: "./assets/zhuoshui_river_ar_motion.mov",
        },
        video1: {
          webm: "./assets/zengwen_river_ar_motion.webm",
          mov: "./assets/zengwen_river_ar_motion.mov",
        },
        video2: {
          webm: "./assets/xiuguluan_river_ar_motion.webm",
          mov: "./assets/xiuguluan_river_ar_motion.mov",
        },
      };

      function isIOSLike() {
        const ua = navigator.userAgent || "";
        const platform = navigator.platform || "";

        // iPadOS 13+ 有時會偽裝成 Mac，但 touch points > 1。
        return (
          /iPad|iPhone|iPod/.test(ua) ||
          (platform === "MacIntel" && navigator.maxTouchPoints > 1)
        );
      }

      function canPlayWebM() {
        const testVideo = document.createElement("video");
        return (
          testVideo.canPlayType('video/webm; codecs="vp9"') !== "" ||
          testVideo.canPlayType('video/webm; codecs="vp8"') !== "" ||
          testVideo.canPlayType("video/webm") !== ""
        );
      }

      /*
        iOS 即使回報可以播某些 WebM，也不代表 alpha + A-Frame texture 穩定。
        所以 iPhone / iPad 一律走 MOV overlay。
      */
      const USE_MOV_OVERLAY = isIOSLike() || !canPlayWebM();

      function prepareInlineMutedVideo(video) {
        if (!video) return;
        video.muted = true;
        video.defaultMuted = true;
        video.setAttribute("muted", "");
        video.playsInline = true;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.setAttribute("preload", "auto");
      }

      function setVideoSource(video, src) {
        if (!video || !src) return;

        const current = video.currentSrc || video.src || "";
        const absoluteSrc = new URL(src, window.location.href).href;

        if (current !== absoluteSrc) {
          video.pause();
          video.removeAttribute("src");
          video.load();
          video.src = src;
          video.load();
        }
      }

      function getSourceForVideo(videoId) {
        const source = TRANSPARENT_VIDEO_SOURCES[videoId];
        if (!source) {
          console.warn("找不到影片來源設定:", videoId);
          return "";
        }

        return USE_MOV_OVERLAY ? source.mov : source.webm;
      }

      function getMovSourceForVideo(videoId) {
        const source = TRANSPARENT_VIDEO_SOURCES[videoId];
        return source ? source.mov : "";
      }

      AFRAME.registerComponent("ios-video-unlock", {
        init: function () {
          const unlock = () => {
            const videos = Array.from(document.querySelectorAll("video"));

            videos.forEach((video) => {
              prepareInlineMutedVideo(video);

              const playPromise = video.play();
              if (playPromise && typeof playPromise.then === "function") {
                playPromise
                  .then(() => {
                    video.pause();
                  })
                  .catch(() => {
                    // iOS 可能仍會擋掉；後續 targetFound / targetLost 時會再嘗試播放。
                  });
              } else {
                video.pause();
              }
            });

            window.removeEventListener("touchstart", unlock);
            window.removeEventListener("click", unlock);
          };

          window.addEventListener("touchstart", unlock, {
            once: true,
            passive: true,
          });
          window.addEventListener("click", unlock, { once: true });
        },
      });

      AFRAME.registerComponent("persistent-video-target", {
        schema: {
          video: { type: "selector" },
          width: { type: "number", default: 1.38 },
          height: { type: "number", default: 2.5 },
        },

        init: function () {
          const targetEl = this.el;
          const sceneEl = targetEl.sceneEl;
          const videoElement = this.data.video;

          this.isTracking = false;
          this.videoPlane = null;

          this.centerOverlay = document.querySelector("#centerVideoOverlay");
          this.centerVideo = document.querySelector("#centerVideo");

          if (!videoElement) {
            console.warn("persistent-video-target 缺少 video selector");
            return;
          }

          this.videoId = videoElement.id;
          this.activeSrc = getSourceForVideo(this.videoId);
          this.movSrc = getMovSourceForVideo(this.videoId);

          prepareInlineMutedVideo(videoElement);
          setVideoSource(videoElement, this.activeSrc);

          /*
            只有 WebM 模式才建立 AR 裡的 a-video。
            MOV overlay 模式不建立 / 不顯示 a-video，避免 iOS WebGL alpha 變白底。
          */
          if (!USE_MOV_OVERLAY) {
            this.videoPlane = document.createElement("a-video");
            this.videoPlane.setAttribute("src", "#" + videoElement.id);
            this.videoPlane.setAttribute("width", this.data.width);
            this.videoPlane.setAttribute("height", this.data.height);
            this.videoPlane.setAttribute("position", "0 0 0");
            this.videoPlane.setAttribute("rotation", "0 0 0");
            this.videoPlane.setAttribute(
              "material",
              "transparent: true; alphaTest: 0.01; side: double",
            );
            this.videoPlane.object3D.visible = false;

            sceneEl.appendChild(this.videoPlane);
          }

          targetEl.addEventListener("targetFound", () => {
            console.log(
              "找到目標:",
              this.videoId,
              "MOV overlay:",
              USE_MOV_OVERLAY,
            );
            document.body.classList.add("is-video-playing");

            if (USE_MOV_OVERLAY) {
              this.playCenterOverlayAsMov(videoElement);
              return;
            }

            this.isTracking = true;

            if (this.videoPlane) {
              this.videoPlane.object3D.visible = true;
            }

            // 如果中央影片正在播，把秒數同步回原本的 videoElement。
            if (this.centerVideo && this.centerVideo.currentSrc) {
              try {
                videoElement.currentTime = this.centerVideo.currentTime;
              } catch (err) {
                console.log("同步中央影片秒數失敗:", err);
              }

              this.centerVideo.pause();
              this.centerVideo.removeAttribute("src");
              this.centerVideo.load();
            }

            if (this.centerOverlay) {
              this.centerOverlay.classList.remove("is-active");
            }

            prepareInlineMutedVideo(videoElement);
            setVideoSource(videoElement, this.activeSrc);

            videoElement
              .play()
              .catch((err) => console.log("AR WebM 影片播放受阻:", err));
          });

          targetEl.addEventListener("targetLost", () => {
            console.log(
              "失去目標:",
              this.videoId,
              "MOV overlay:",
              USE_MOV_OVERLAY,
            );

            if (USE_MOV_OVERLAY) {
              /*
                原始邏輯是 targetLost 會切到中央播放。
                iOS 本來就用中央 overlay，所以這裡保持 overlay 繼續播放。
              */
              this.playCenterOverlayAsMov(videoElement);
              return;
            }

            this.isTracking = false;

            if (this.videoPlane) {
              this.videoPlane.object3D.visible = false;
            }

            if (!this.centerOverlay || !this.centerVideo) return;

            const activeSrc = videoElement.currentSrc || videoElement.src;
            if (!activeSrc) return;

            prepareInlineMutedVideo(this.centerVideo);
            setVideoSource(this.centerVideo, activeSrc);

            try {
              this.centerVideo.currentTime = videoElement.currentTime;
            } catch (err) {
              console.log("同步 AR 影片秒數到中央影片失敗:", err);
            }

            this.centerVideo.loop = videoElement.loop;
            this.centerOverlay.classList.add("is-active");

            this.centerVideo
              .play()
              .catch((err) => console.log("中央影片播放受阻:", err));
          });

          this.worldPosition = new THREE.Vector3();
          this.worldQuaternion = new THREE.Quaternion();
          this.worldScale = new THREE.Vector3();
        },

        playCenterOverlayAsMov: function (videoElement) {
          if (!this.centerOverlay || !this.centerVideo) return;

          prepareInlineMutedVideo(this.centerVideo);

          const nextSrc = this.movSrc || this.activeSrc;
          if (!nextSrc) return;

          const previousSrc =
            this.centerVideo.currentSrc || this.centerVideo.src || "";
          const nextAbsoluteSrc = new URL(nextSrc, window.location.href).href;
          const isSameVideo = previousSrc === nextAbsoluteSrc;

          let syncTime = 0;

          if (isSameVideo && !Number.isNaN(this.centerVideo.currentTime)) {
            syncTime = this.centerVideo.currentTime;
          } else if (videoElement && !Number.isNaN(videoElement.currentTime)) {
            syncTime = videoElement.currentTime;
          }

          setVideoSource(this.centerVideo, nextSrc);
          this.centerVideo.loop = true;

          try {
            this.centerVideo.currentTime = syncTime;
          } catch (err) {
            console.log("設定 MOV overlay 秒數失敗:", err);
          }

          this.centerOverlay.classList.add("is-active");

          this.centerVideo
            .play()
            .catch((err) => console.log("MOV overlay 播放受阻:", err));
        },

        tick: function () {
          if (USE_MOV_OVERLAY) return;
          if (!this.isTracking || !this.videoPlane) return;

          this.el.object3D.getWorldPosition(this.worldPosition);
          this.el.object3D.getWorldQuaternion(this.worldQuaternion);
          this.el.object3D.getWorldScale(this.worldScale);

          this.videoPlane.object3D.position.copy(this.worldPosition);
          this.videoPlane.object3D.quaternion.copy(this.worldQuaternion);
          this.videoPlane.object3D.scale.copy(this.worldScale);
        },
      });
    </script>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./assets/rivers.mind"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      ios-video-unlock
    >
      <a-assets>
        <!-- 影片來源由 JS 指定，不在這裡放 source，避免 Safari / iOS 判斷錯誤格式 -->
        <video
          id="video0"
          preload="auto"
          loop
          muted
          webkit-playsinline
          playsinline
        ></video>

        <video
          id="video1"
          preload="auto"
          loop
          muted
          webkit-playsinline
          playsinline
        ></video>

        <video
          id="video2"
          preload="auto"
          loop
          muted
          webkit-playsinline
          playsinline
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity
        mindar-image-target="targetIndex: 0"
        persistent-video-target="video: #video0; width: 1.38; height: 2.5"
      ></a-entity>

      <a-entity
        mindar-image-target="targetIndex: 1"
        persistent-video-target="video: #video1; width: 1.38; height: 2.5"
      ></a-entity>

      <a-entity
        mindar-image-target="targetIndex: 2"
        persistent-video-target="video: #video2; width: 1.38; height: 2.5"
      ></a-entity>
    </a-scene>

    <!--
      原本中央播放用的 overlay。
      在 iOS / MOV 模式下，它同時作為透明 MOV 的顯示層。
    -->
    <div id="centerVideoOverlay">
      <video id="centerVideo" muted loop playsinline webkit-playsinline></video>
    </div>
  </body>
</html>
